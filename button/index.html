<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RSDS Typografi</title>
    <link href="../styles/rsds.css" rel="stylesheet" />
    <script>
      if (window.location.hostname === "localhost") {
        import("https://kalabasa.github.io/simple-live-reload/script.js");
      }
    </script>
  </head>
  <body>
    <main class="rsds-typo">
        <h1>Knappar</h1>
        <h2>Knapp</h2>
        <button class="rsds-button">Vanlig knapp</button>
        <div class="special">
          <h2>Spökknapp</h2>
            <button class="rsds-button--ghost">Spökig knapp</button>
        </div>
    </main>
  </body>
</html>
